name: PR

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/educational-game-website/package-lock.json

      - name: Build website
        working-directory: website/educational-game-website
        env:
          NEXT_PUBLIC_BASE_PATH: /EducationTechnology
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
