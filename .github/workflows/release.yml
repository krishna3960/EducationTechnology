name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semrel.outputs.new_release_published }}
      new_release_git_tag: ${{ steps.semrel.outputs.new_release_git_tag }}
      new_release_version: ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_git_tag }}

      - name: Export Godot game (Web)
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          relative_project_path: ./educational-game
          archive_output: false
          use_preset_export_path: true

      - name: Stage game into website public/
        run: |
          rm -rf website/educational-game-website/public/game
          mkdir -p website/educational-game-website/public/game
          cp -r educational-game/build/web/Web/. website/educational-game-website/public/game/

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/educational-game-website/package-lock.json

      - name: Build website (static export)
        working-directory: website/educational-game-website
        env:
          NEXT_PUBLIC_BASE_PATH: /EducationTechnology
          NEXT_PUBLIC_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          if [ ! -f public/game/index.html ]; then
            echo "::error::public/game/index.html missing — Godot export did not produce a web build"
            ls -la public/game/ || true
            exit 1
          fi
          npm ci
          npm run build
          touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/educational-game-website/out

      - id: deployment
        uses: actions/deploy-pages@v4
